services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gleitzeit
      MYSQL_USER: gleitzeit_user
      MYSQL_PASSWORD: changeme
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  php:
    build: .
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
